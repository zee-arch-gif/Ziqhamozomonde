<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - TechFix IT Solutions</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        header {
            background-color: #1f3c88;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #00bcd4;
        }

        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .contact-container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        .btn {
            background-color: #1f3c88;
            color: white;
            padding: 12px;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            background-color: #163172;
        }

        .info {
            margin-top: 20px;
            font-size: 14px;
        }

        footer {
            background-color: #1f3c88;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>

    <!-- SIMPLE CONFIRMATION SCRIPT -->
    <script>
        function showMessage(event) {
            event.preventDefault();
            alert("Thank you! Your request has been submitted.");
        }
    </script>

</head>

<body>

<header>
    <h1>TechFix IT Solutions</h1>
    <p>Contact & Book a Service</p>
</header>

<nav>
    <a href="Index.html">Home</a>
    <a href="About.html">About</a>
    <a href="Service.html">Services</a>
    <a href="Testimonials.html">Testimonials</a>
    <a href="FAQ.html">FAQ</a>
    <a href="Contact.html">Contact</a>
</nav>

<section class="section">
    <h2>Book a Service</h2>

    <div class="contact-container">

        <form onsubmit="showMessage(event)">
            
            <label>Full Name:</label>
            <input type="text" required>

            <label>Email:</label>
            <input type="email" required>

            <label>Phone Number:</label>
            <input type="tel" required>

            <label>Select Service:</label>
            <select required>
                <option value="">-- Choose a Service --</option>
                <option>Computer Repair</option>
                <option>Network Installation</option>
                <option>IT Consulting</option>
                <option>Maintenance & Support</option>
            </select>

            <label>Describe Your Issue:</label>
            <textarea rows="4" required></textarea>

            <button type="submit" class="btn">Submit Request</button>

        </form>

        <div class="info">
            <p><strong>Email:</strong> support@techfix.com</p>
            <p><strong>Phone:</strong> 012 345 6789</p>
        </div>

    </div>
    <h3>Our Location</h3>

<iframe 
    src="https://www.google.com/maps?q=Cape%20Town,%20South%20Africa&output=embed"
    width="100%" 
    height="300" 
    style="border:0; border-radius:8px;" 
    allowfullscreen="" 
    loading="lazy">
</iframe>
</section>

<footer>
    <p>© 2026 TechFix IT Solutions</p>
</footer>

</body>
</html>
